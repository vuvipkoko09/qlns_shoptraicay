spring.datasource.url=jdbc:mysql://localhost:3306/quanlynhansu?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Tăng giới hạn upload file lên 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# 1. Cấu hình giờ mặc định của ứng dụng là Việt Nam
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# 2. Quan trọng nhất: Thêm param serverTimezone vào URL kết nối Database
spring.datasource.url=jdbc:mysql://localhost:3306/quanlynhansu?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true